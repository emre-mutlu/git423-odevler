name: Ödev Kontrol ve Etiketleme

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  grade-and-label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v3

      - name: Node.js Kurulumu
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Kontrol Scriptini Çalıştır
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/grade.js
